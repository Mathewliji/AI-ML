# ── Shared Airflow environment ─────────────────────────────────────────────────
x-airflow-common: &airflow-common
  image: apache/airflow:3.0.0
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    PYTHONPATH: /opt/airflow
    OLLAMA_HOST: http://ollama:11434
    OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
    DAYS_WARN: ${DAYS_WARN:-45}
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scanner:/opt/airflow/scanner
    - ./logs:/opt/airflow/logs
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── Metadata database ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  # ── Airflow init (runs once, then exits) ────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        pip install --quiet -r /requirements.txt &&
        airflow db migrate &&
        airflow users create
          --username admin --password admin
          --firstname Admin --lastname User
          --role Admin --email admin@example.com
      "
    restart: "no"

  # ── Airflow scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --quiet -r /requirements.txt && airflow scheduler"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow webserver (UI at http://localhost:8080) ─────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --quiet -r /requirements.txt && airflow webserver"
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Ollama (local LLM server) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s   # model pull can take a while on first boot

  # ── FastAPI service (REST API at http://localhost:8000) ────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      DAYS_WARN: ${DAYS_WARN:-45}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  ollama_models:
