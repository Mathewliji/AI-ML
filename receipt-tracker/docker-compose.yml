services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: receipts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: receipts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No ports: — Postgres is only reachable from the compose-internal network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "127.0.0.1:8001:8000"   # 8001 on host → 8000 in container (8000 used by aiops-sentinel)
    env_file: .env
    environment:
      DATABASE_URL: postgresql://receipts:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/receipts
      MOCK_MODE: ${MOCK_MODE:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  ui:
    build: .
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8502:8501"             # 8502 on host → 8501 in container
    env_file: .env
    environment:
      API_URL: http://api:8000  # internal compose network — always 8000 inside
    depends_on:
      - api

volumes:
  postgres_data:
